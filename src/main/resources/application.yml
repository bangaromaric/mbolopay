server:
  # Cloud Run injecte la variable PORT dynamiquement (défaut : 8080)
  port: ${PORT:8080}

spring:
  application:
    name: MboloPay

  datasource:
    url: jdbc:h2:mem:mbolopay;DB_CLOSE_DELAY=-1;MODE=LEGACY
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    org.springframework.modulith: DEBUG
    ga.banga.mbolopay: DEBUG
